<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Dashboard 2026</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="dashboard">
        <section class="page active" id="page-slogan">
            <div class="content">
                <h2 class="slogan-text">모든 사람의 모든 시간이 가치 있도록,<br><span>사람과 로봇을 잇다.</span></h2>
            </div>
        </section>

        <section class="page" id="page-org">
            <h2 class="page-title">Organization Chart</h2>
            <div class="org-grid" id="org-container">
                </div>
        </section>

        <section class="page" id="page-schedule">
            <h2 class="page-title">2026 Project Schedule</h2>
            <div class="calendar-grid" id="calendar-container">
                </div>
        </section>

        <section class="page" id="page-notice">
            <div class="notice-card">
                <p class="notice-label">NOTICE</p>
                <h3 class="notice-text">출/퇴근 시에 캡스 지문인식 혹은<br>카드 태그를 통하여 기록해 주세요.</h3>
            </div>
        </section>
    </div>

    <script src="./script.js"></script>
</body>
</html>
