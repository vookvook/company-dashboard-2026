<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Company Dashboard 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>테스트 화면</h1>
    <div id="dashboard">
        <section class="page active" id="page-slogan">
            <div class="content">
                <h2 class="slogan-text">모든 사람의 모든 시간이 가치 있도록,<br><span>사람과 로봇을 잇다.</span></h2>
            </div>
        </section>

        <section class="page" id="page-org">
            <h2 class="title">Organization Chart</h2>
            <div class="org-grid" id="org-container">
                </div>
        </section>

        <section class="page" id="page-notice">
            <div class="notice-card">
                <h3>NOTICE</h3>
                <p>출/퇴근 시에 캡스 지문인식 혹은<br>카드 태그를 통하여 기록해 주세요.</p>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
